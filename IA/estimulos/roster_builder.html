<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Roster (IB Oral)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        h1 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .stats-panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }
        .stat-card { background: #ecf0f1; border-left: 5px solid #2ecc71; padding: 10px 15px; border-radius: 4px; flex: 1; min-width: 150px; }
        .stat-card h4 { margin: 0 0 5px 0; font-size: 14px; color: #2c3e50; text-transform: uppercase;}
        .stat-numbers { font-size: 14px; color: #7f8c8d; line-height: 1.4; }
        .stat-numbers strong { color: #2c3e50; }
        .grid { display: flex; gap: 20px; align-items: flex-start; }
        .sidebar { width: 300px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-height: 70vh; overflow-y: auto; }
        .student-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .student-item:hover { background: #f0f8ff; }
        .student-item.active { background: #3498db; color: white; font-weight: bold; }
        .student-status { font-size: 12px; font-style: italic; }
        .editor { flex: 1; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .options-grid { display: flex; gap: 20px; margin-top: 15px; }
        .option-box { flex: 1; background: #f9f9f9; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; margin-top: 15px;}
        select { width: 100%; padding: 10px; font-size: 15px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 10px;}
        .preview-container { width: 100%; height: 200px; background: #eaeaea; border-radius: 4px; margin-top: 10px; border: 2px dashed #ccc; overflow: hidden; display: flex; align-items: center; justify-content: center; text-align: center; color: #7f8c8d;}
        .preview-img { width: 100%; height: 100%; object-fit: cover; }
        .preview-text { width: 100%; height: 100%; background: #fff3e0; padding: 15px; box-sizing: border-box; font-family: 'Georgia', serif; font-size: 13px; text-align: left; overflow: hidden; color: #333;}
        .generate-area { margin-top: 20px; text-align: right; }
        button { padding: 12px 25px; background: #27ae60; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #2ecc71; }
        textarea { width: 100%; height: 200px; margin-top: 15px; font-family: monospace; padding: 10px; border-radius: 4px; border: 1px solid #ccc; resize: vertical; display: none; }
    </style>
</head>
<body>

    <h1>📝 IB Oral: Constructor de Roster</h1>
    <div class="stats-panel" id="statsPanel"></div>

    <div class="grid">
        <div class="sidebar" id="studentList">Cargando estudiantes...</div>
        <div class="editor" id="editorArea" style="display: none;">
            <h2 id="editorTitle">Selecciona un estudiante</h2>
            
            <div class="options-grid">
                <div class="option-box">
                    <h3 style="margin-top:0; color: #e67e22;">Opción de Estímulo 1</h3>
                    <label>Seleccionar Estímulo:</label>
                    <select id="stimulusSelect1"></select>
                    <div id="preview1" class="preview-container">Sin selección</div>
                    <label>Tema de Seguimiento (Parte 3):</label>
                    <select id="followUpSelect1"></select>
                </div>

                <div class="option-box">
                    <h3 style="margin-top:0; color: #2980b9;">Opción de Estímulo 2</h3>
                    <label>Seleccionar Estímulo:</label>
                    <select id="stimulusSelect2"></select>
                    <div id="preview2" class="preview-container">Sin selección</div>
                    <label>Tema de Seguimiento (Parte 3):</label>
                    <select id="followUpSelect2"></select>
                </div>
            </div>

            <div class="generate-area">
                <button onclick="saveCurrentStudent()">💾 Guardar Opciones</button>
            </div>
        </div>
    </div>

    <div class="editor" style="margin-top: 20px;">
        <h2>Exportar JSON Final</h2>
        <button onclick="generateJSON()" style="background: #8e44ad;">📄 Generar roster.json</button>
        <textarea id="jsonOutput" readonly></textarea>
    </div>

    <script>
        const MASTER_DATA_URL = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/IA/estimulos/preguntas.json'; 
        const ROSTER_URL = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/IA/rubric/roster.json';
        const STIMULI_URL = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/IA/rubric/stimuli.json';

        let masterData = {}; let roster = []; let stimuliMap = []; let currentStudentIndex = null;
        const THEMES = [
            { key: "identidades", label: "Identidades" }, { key: "organizacion_social", label: "Organización social" },
            { key: "experiencias", label: "Experiencias" }, { key: "como_compartimos_el_planeta", label: "Cómo compartimos el planeta" },
            { key: "ingenio_humano", label: "Ingenio humano" }
        ];

        async function init() {
            try {
                const [masterRes, rosterRes, stimuliRes] = await Promise.all([ fetch(MASTER_DATA_URL), fetch(ROSTER_URL), fetch(STIMULI_URL) ]);
                masterData = await masterRes.json();
                roster = (await rosterRes.json()).students; 
                stimuliMap = (await stimuliRes.json()).stimuli;
                roster.forEach(s => { if(!s.options) s.options = []; });
                populateDropdowns(); updateSidebar(); updateStats();
            } catch (err) { alert("Error cargando los datos."); console.error(err); }
        }

        function populateDropdowns() {
            const selects = [document.getElementById('stimulusSelect1'), document.getElementById('stimulusSelect2')];
            const followUps = [document.getElementById('followUpSelect1'), document.getElementById('followUpSelect2')];

            let stimOptions = '<option value="">-- Selecciona imagen o texto --</option>';
            // NOW INCLUDES EXTRACTS AND IMAGES!
            stimuliMap.forEach(s => { stimOptions += `<option value="${s.id}">${s.level} | ${s.label}</option>`; });

            let themeOptions = '<option value="">-- Selecciona tema de seguimiento --</option>';
            THEMES.forEach(t => { themeOptions += `<option value="${t.key}">${t.label}</option>`; });

            selects.forEach(sel => { sel.innerHTML = stimOptions; sel.addEventListener('change', updatePreviews); });
            followUps.forEach(sel => { sel.innerHTML = themeOptions; });
        }

        function updateSidebar() {
            const list = document.getElementById('studentList'); list.innerHTML = '';
            roster.forEach((student, idx) => {
                const div = document.createElement('div');
                div.className = `student-item ${idx === currentStudentIndex ? 'active' : ''}`;
                const status = (student.options && student.options.length === 2) ? "✅" : "❌";
                div.innerHTML = `<strong>${student.name}</strong> (${student.level}) <span style="float:right">${status}</span>`;
                div.onclick = () => loadStudent(idx);
                list.appendChild(div);
            });
        }

        function loadStudent(index) {
            currentStudentIndex = index; const student = roster[index];
            document.getElementById('editorArea').style.display = 'block';
            document.getElementById('editorTitle').innerText = `Editando a: ${student.name} (${student.level})`;
            const opt1 = student.options[0] || { stimulus_id: "", follow_up_theme: "" };
            const opt2 = student.options[1] || { stimulus_id: "", follow_up_theme: "" };
            document.getElementById('stimulusSelect1').value = opt1.stimulus_id; document.getElementById('followUpSelect1').value = opt1.follow_up_theme;
            document.getElementById('stimulusSelect2').value = opt2.stimulus_id; document.getElementById('followUpSelect2').value = opt2.follow_up_theme;
            updateSidebar(); updatePreviews();
        }

        // DEEP SEARCH FOR PREVIEWS (IMAGES AND TEXT)
        function updatePreviews() {
            function findDeep(dataObj, keyName, targetVal) {
                let result = null;
                function search(node) {
                    if (!node || typeof node !== 'object') return;
                    if (node[keyName] === targetVal || (node[targetVal] && node[targetVal].text_spanish)) {
                        result = node[targetVal] || node; return;
                    }
                    Object.values(node).forEach(search);
                }
                search(dataObj); return result;
            }

            [1, 2].forEach(num => {
                const stimId = document.getElementById(`stimulusSelect${num}`).value;
                const previewEl = document.getElementById(`preview${num}`);
                if (!stimId) { previewEl.innerHTML = "Sin selección"; return; }
                
                const stimData = stimuliMap.find(s => s.id === stimId);
                
                if (stimData && stimData.type === 'image') {
                    const foundImg = findDeep(masterData, 'image_id', stimData.image_id);
                    previewEl.innerHTML = foundImg ? `<img class="preview-img" src="${foundImg.image_url}">` : "Imagen no encontrada";
                } else if (stimData && stimData.type === 'extract') {
                    const foundText = findDeep(masterData, 'extract_id', stimData.extract_id);
                    previewEl.innerHTML = foundText ? `<div class="preview-text"><strong>${foundText.title}</strong><br><br>${foundText.text_spanish.substring(0, 150)}...</div>` : "Texto no encontrado";
                }
            });
        }

        function saveCurrentStudent() {
            if (currentStudentIndex === null) return;
            const opt1 = { stimulus_id: document.getElementById('stimulusSelect1').value, follow_up_theme: document.getElementById('followUpSelect1').value };
            const opt2 = { stimulus_id: document.getElementById('stimulusSelect2').value, follow_up_theme: document.getElementById('followUpSelect2').value };
            if(!opt1.stimulus_id || !opt1.follow_up_theme || !opt2.stimulus_id || !opt2.follow_up_theme) { alert("Llena todos los campos."); return; }
            roster[currentStudentIndex].options = [opt1, opt2];
            updateSidebar(); updateStats();
        }

        function updateStats() {
            let counts = {}; THEMES.forEach(t => counts[t.key] = { label: t.label, asStimulus: 0, asFollowUp: 0 });
            roster.forEach(student => {
                student.options.forEach(opt => {
                    if (opt.follow_up_theme && counts[opt.follow_up_theme]) counts[opt.follow_up_theme].asFollowUp++;
                    if (opt.stimulus_id) {
                        const stim = stimuliMap.find(s => s.id === opt.stimulus_id);
                        if (stim && stim.theme) {
                            const formatted = stim.theme.toLowerCase().replace(/ /g, '_').replace(/ó/g, 'o').replace(/í/g, 'i');
                            if(counts[formatted]) counts[formatted].asStimulus++;
                        }
                    }
                });
            });
            const panel = document.getElementById('statsPanel'); panel.innerHTML = '';
            THEMES.forEach(t => {
                const d = counts[t.key];
                panel.innerHTML += `<div class="stat-card"><h4>${d.label}</h4><div class="stat-numbers">Imagen/Texto: <strong>${d.asStimulus}</strong><br>Pt 3: <strong>${d.asFollowUp}</strong></div></div>`;
            });
        }

        function generateJSON() {
            document.getElementById('jsonOutput').value = JSON.stringify({ students: roster }, null, 2);
            document.getElementById('jsonOutput').style.display = 'block'; document.getElementById('jsonOutput').select();
        }

        init();
    </script>
</body>
</html>
