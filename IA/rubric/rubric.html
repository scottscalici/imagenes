<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Spanish Oral Grader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #2c3e50; }
        
        /* Dropdown Setup Section */
        .setup-section { display: flex; gap: 20px; margin-bottom: 30px; background: #ecf0f1; padding: 20px; border-radius: 8px; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #bdc3c7; }
        
        /* Rubric Grid Styling */
        .criterion-section { margin-bottom: 40px; }
        .aspect-row { display: flex; margin-bottom: 10px; gap: 10px; align-items: stretch; }
        .aspect-label { width: 150px; font-weight: bold; padding: 10px; background: #34495e; color: white; display: flex; align-items: center; border-radius: 5px; }
        
        .descriptor-btn { 
            flex: 1; padding: 15px; background: #fdfdfd; border: 2px solid #e0e0e0; border-radius: 5px; cursor: pointer; text-align: left; font-size: 13px; transition: 0.2s;
        }
        .descriptor-btn:hover { border-color: #3498db; }
        .descriptor-btn.selected { background: #e8f4fd; border-color: #2980b9; box-shadow: 0 0 5px rgba(41, 128, 185, 0.5); }
        .level-badge { display: block; font-weight: bold; color: #2980b9; margin-bottom: 5px; }

        /* Results Section */
        .results-section { background: #eef7f2; padding: 20px; border-radius: 8px; margin-top: 30px; border-left: 5px solid #27ae60; }
        .score-display { font-size: 24px; font-weight: bold; margin-bottom: 15px; color: #27ae60; }
        textarea { width: 100%; height: 150px; padding: 15px; border-radius: 5px; border: 1px solid #bdc3c7; font-family: inherit; font-size: 15px; resize: vertical; margin-bottom: 15px; }
        
        button.action-btn { background: #27ae60; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        button.action-btn:hover { background: #219150; }
        button.copy-btn { background: #3498db; }
        button.copy-btn:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 IB Spanish Oral Assessment Grader</h1>
    
    <div class="setup-section">
        <div class="input-group">
            <label for="studentDropdown"><strong>Seleccionar Estudiante:</strong></label>
            <select id="studentDropdown">
                <option value="" disabled selected>Cargando estudiantes...</option>
            </select>
            <small id="studentInfo" style="margin-top:5px; color:#7f8c8d;"></small>
        </div>
        <div class="input-group">
            <label for="stimulusDropdown"><strong>Estímulo Utilizado:</strong></label>
            <select id="stimulusDropdown" disabled>
                <option value="" disabled selected>Selecciona un estudiante primero</option>
            </select>
        </div>
    </div>

    <div id="rubricContainer">
        <h3 style="color: #7f8c8d; text-align: center;">Selecciona un estudiante para cargar la rúbrica (SL o HL).</h3>
    </div>

    <div class="results-section">
        <div class="score-display">Puntuación Total: <span id="totalScore">0</span> / 30</div>
        <label for="commentOutput"><strong>Comentarios Generados:</strong></label>
        <textarea id="commentOutput" readonly placeholder="Selecciona descriptores en la rúbrica para generar retroalimentación..."></textarea>
        <div>
            <button class="action-btn copy-btn" onclick="copyComment()">Copiar Texto</button>
            <button class="action-btn" onclick="saveEvaluation()">Guardar Evaluación Local</button>
        </div>
    </div>
</div>

<script>
    // Live GitHub URLs
    const ROSTER_URL = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/IA/rubric/roster.json';
    const STIMULI_URL = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/IA/rubric/stimuli.json';
    const RUBRIC_URL = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/IA/rubric/rubric.json';

    let rosterData = [];
    let stimuliData = [];
    let rubricData = {};
    let currentStudentLevel = "";
    let selectedScores = { A: 0, B1: 0, B2: 0, C: 0 };
    let selectedComments = {};

    // 1. Fetch all JSON files on load
    Promise.all([
        fetch(ROSTER_URL).then(res => res.json()),
        fetch(STIMULI_URL).then(res => res.json()),
        fetch(RUBRIC_URL).then(res => res.json())
    ]).then(([roster, stimuli, rubric]) => {
        rosterData = roster.students;
        stimuliData = stimuli.stimuli;
        rubricData = rubric.rubric;
        populateStudents();
    }).catch(error => console.error("Error loading JSON files:", error));

    // 2. Populate Student Dropdown
    function populateStudents() {
        const dropdown = document.getElementById("studentDropdown");
        dropdown.innerHTML = '<option value="" disabled selected>Seleccionar estudiante...</option>';
        
        rosterData.forEach(student => {
            let option = document.createElement("option");
            option.value = student.id;
            option.textContent = `${student.time} | ${student.name} (${student.level})`;
            dropdown.appendChild(option);
        });

        dropdown.addEventListener("change", handleStudentSelection);
    }

    // 3. Handle Student Selection
    function handleStudentSelection(e) {
        const studentId = e.target.value;
        const student = rosterData.find(s => s.id === studentId);
        currentStudentLevel = student.level; 

        document.getElementById("studentInfo").textContent = `Fecha: ${student.date} | Nivel: ${student.level}`;
        
        selectedScores = { A: 0, B1: 0, B2: 0, C: 0 };
        selectedComments = {};
        updateResults();

        // Pass the whole student object to sync the stimuli
        populateStimuli(student);
        renderRubric(currentStudentLevel);
    }

    // 4. Populate Stimuli (Synced with Prep Mode Options)
    function populateStimuli(student) {
        const dropdown = document.getElementById("stimulusDropdown");
        dropdown.disabled = false;
        dropdown.innerHTML = '<option value="" disabled selected>¿Qué estímulo eligió el estudiante?</option>';

        // PART A: Show the pre-assigned options from roster.json at the very top
        if (student.options && student.options.length > 0) {
            const assignedGroup = document.createElement("optgroup");
            assignedGroup.label = "⭐ OPCIONES ASIGNADAS (PREP MODE)";
            
            student.options.forEach(opt => {
                const stim = stimuliData.find(s => s.id === opt.stimulus_id);
                if (stim) {
                    let option = document.createElement("option");
                    option.value = stim.id;
                    option.textContent = `➡ ${stim.label} (Seguimiento: ${opt.follow_up_theme.replace(/_/g, ' ')})`;
                    assignedGroup.appendChild(option);
                }
            });
            dropdown.appendChild(assignedGroup);
        }

        // PART B: Show all other stimuli for their level below, just in case they went off-script
        const otherGroup = document.createElement("optgroup");
        otherGroup.label = "Todos los demás (Respaldo)";
        
        const filtered = stimuliData.filter(s => s.level === student.level);
        filtered.sort((a, b) => {
            const themeCompare = a.theme.localeCompare(b.theme, 'es');
            if (themeCompare !== 0) return themeCompare;
            return a.label.localeCompare(b.label, 'es', { numeric: true });
        });

        filtered.forEach(stim => {
            // Don't duplicate if it's already in their assigned options
            const isAssigned = student.options && student.options.some(opt => opt.stimulus_id === stim.id);
            if (!isAssigned) {
                let option = document.createElement("option");
                option.value = stim.id;
                option.textContent = `${stim.theme} - ${stim.label}`;
                otherGroup.appendChild(option);
            }
        });
        
        dropdown.appendChild(otherGroup);
    }

    // 5. Render the Rubric
    function renderRubric(level) {
        const container = document.getElementById("rubricContainer");
        container.innerHTML = ""; 

        const criteriaToLoad = [
            { id: "A", key: `criterionA_${level}` },
            { id: "B1", key: `criterionB1_${level}` },
            { id: "B2", key: "criterionB2" }, 
            { id: "C", key: "criterionC" }    
        ];

        criteriaToLoad.forEach(crit => {
            const critData = rubricData[crit.key];
            if (!critData) return;

            const section = document.createElement("div");
            section.className = "criterion-section";
            section.innerHTML = `<h2>${critData.title} (Max ${critData.maxMarks})</h2>`;

            for (const [aspectName, levelsArray] of Object.entries(critData.aspects)) {
                const row = document.createElement("div");
                row.className = "aspect-row";
                
                const formattedName = aspectName.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
                row.innerHTML = `<div class="aspect-label">${formattedName}</div>`;

                levelsArray.forEach(levelObj => {
                    const btn = document.createElement("button");
                    btn.className = "descriptor-btn";
                    btn.innerHTML = `<span class="level-badge">Nivel ${levelObj.level} (${levelObj.marks} pts)</span>${levelObj.englishDescriptor}`;
                    
                    btn.onclick = () => {
                        row.querySelectorAll('.descriptor-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        handleSelection(crit.id, aspectName, levelObj);
                    };
                    row.appendChild(btn);
                });
                section.appendChild(row);
            }
            container.appendChild(section);
        });
    }

    // 6. Handle Rubric Clicks & Calculations
    function handleSelection(critId, aspectName, levelObj) {
        if (!selectedComments[critId]) selectedComments[critId] = {};
        
        selectedComments[critId][aspectName] = {
            comment: levelObj.spanishComment,
            level: levelObj.level
        };

        let totalLevels = 0;
        let count = 0;
        for (const key in selectedComments[critId]) {
            totalLevels += selectedComments[critId][key].level;
            count++;
        }
        
        let averageLevel = totalLevels / count; 

        if (critId === "A") {
            selectedScores[critId] = Math.round(averageLevel * 2); 
        } else {
            selectedScores[critId] = Math.round(averageLevel);
        }

        updateResults();
    }

    // 7. Update Score and Concatenate Text
    function updateResults() {
        const total = selectedScores.A + selectedScores.B1 + selectedScores.B2 + selectedScores.C;
        document.getElementById("totalScore").textContent = total;

        let finalParagraph = [];
        const order = ["A", "B1", "B2", "C"]; 
        
        order.forEach(crit => {
            if (selectedComments[crit]) {
                for (const aspect in selectedComments[crit]) {
                    finalParagraph.push(selectedComments[crit][aspect].comment);
                }
            }
        });

        document.getElementById("commentOutput").value = finalParagraph.join(" ");
    }

    // 8. Copy to Clipboard
    function copyComment() {
        const text = document.getElementById("commentOutput").value;
        if (!text) {
            alert("Por favor selecciona descriptores de la rúbrica primero.");
            return;
        }
        navigator.clipboard.writeText(text).then(() => {
            alert("¡Comentario copiado al portapapeles!");
        });
    }

    // 9. Save Data Locally
    function saveEvaluation() {
        const studentId = document.getElementById("studentDropdown").value;
        const stimulusId = document.getElementById("stimulusDropdown").value;
        const comment = document.getElementById("commentOutput").value;

        if (!studentId || !stimulusId || !comment) {
            alert("Asegúrate de seleccionar estudiante, estímulo y puntuaciones de la rúbrica.");
            return;
        }

        const evaluation = {
            evaluationId: "eval_" + Date.now(),
            studentId: studentId,
            stimulusId: stimulusId,
            scores: selectedScores,
            totalScore: selectedScores.A + selectedScores.B1 + selectedScores.B2 + selectedScores.C,
            generatedComment: comment,
            timestamp: new Date().toISOString()
        };

        let saves = JSON.parse(localStorage.getItem('ib_evaluations')) || [];
        saves.push(evaluation);
        localStorage.setItem('ib_evaluations', JSON.stringify(saves));

        alert("¡Evaluación guardada exitosamente en el navegador!");
    }
</script>

</body>
</html>
