<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Calentamientos</title>
    <style>
        body { font-family: sans-serif; background: #eceff1; color: #2c3e50; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        
        .top-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; gap: 10px; }
        .filter-group, .export-group { display: flex; gap: 10px; align-items: center; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: background 0.2s; }
        .btn-course { background: #bdc3c7; color: #2c3e50; }
        .btn-course.active { background: #3498db; color: white; }
        .btn-export { background: #27ae60; color: white; font-size: 1rem; }
        .btn:hover { filter: brightness(1.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 20px; }
        
        .card { background: white; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; border-top: 5px solid #3498db; }
        .card-header { background: #ecf0f1; padding: 10px 15px; font-weight: bold; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; color: #2c3e50; border-bottom: 1px solid #ddd; }
        .card-body { padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        .date-badge { font-size: 0.8rem; background: #e8f8f5; color: #16a085; padding: 4px 8px; border-radius: 12px; font-weight: bold; }
        .count-badge { font-size: 0.85rem; padding: 4px 8px; border-radius: 12px; font-weight: bold; color: white; }
        .count-perfect { background: #2ecc71; }
        .count-warning { background: #f39c12; }

        .row-group { display: flex; gap: 10px; align-items: center; }
        .row-group input[type="text"], .row-group input[type="number"] { padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; width: 100%; box-sizing: border-box; }
        .row-group label { font-weight: bold; font-size: 0.8rem; color: #7f8c8d; width: 85px; flex-shrink: 0; }

        /* Estilos de los Bloques de Verbos */
        .block-zone { display: flex; flex-direction: column; gap: 10px; }
        .block-item { background: #f8f9fa; border: 1px solid #dcdde1; border-radius: 6px; padding: 10px; position: relative; display: flex; flex-direction: column; gap: 6px; }
        .block-row { display: flex; gap: 5px; align-items: center; }
        .block-row input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; width: 100%; box-sizing: border-box; }
        .block-row label { font-size: 0.75rem; color: #555; font-weight: bold; width: 70px; flex-shrink: 0;}
        
        .btn-add-block { background: #3498db; color: white; width: 100%; text-align: center; border-radius: 4px; padding: 8px; font-weight: bold; cursor: pointer; border: none; }
        .btn-del-block { background: #e74c3c; color: white; border: none; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; cursor: pointer; position: absolute; top: 5px; right: 5px; }

        .section-title { font-size: 0.85rem; text-transform: uppercase; font-weight: bold; color: #34495e; margin-bottom: 5px; border-bottom: 2px solid #eee; padding-bottom: 3px; }
    </style>
</head>
<body>

    <datalist id="common-banks">
        <option value="bancos/banco_presente.json">
        <option value="bancos/banco_preterito.json">
        <option value="bancos/banco_imperfecto.json">
        <option value="bancos/banco_subjuntivo_presente.json">
        <option value="bancos/banco_mandatos_informales.json">
        <option value="bancos/banco_mandatos_formales_plurales.json">
        <option value="bancos/banco_participios_pasados.json">
    </datalist>

    <h1>⚙️ Planificador de Calentamientos (Schedules)</h1>
    
    <div class="top-bar">
        <div class="filter-group">
            <strong>Curso:</strong>
            <button class="btn btn-course active" id="btn-s2" onclick="setCourse('s2')">S2 (Sophomores)</button>
            <button class="btn btn-course" id="btn-s4" onclick="setCourse('s4')">S4 (Seniors)</button>
        </div>
        <div class="export-group">
            <button class="btn btn-export" onclick="exportSchedule()">Copiar SCHEDULE Actualizado</button>
        </div>
    </div>

    <div id="main-grid" class="grid">
        <h3 style="text-align:center; width:100%; color:#7f8c8d;">Sincronizando Schedules desde GitHub...</h3>
    </div>

<script>
        let db = { s2: [], s4: [], cal: {} };
        let currentCourse = 's2'; 

        // Definir las rutas correctas para cada tipo de archivo
        const baseCalentamiento = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/calentamiento/';
        const basePlanes = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/planes/';

        Promise.all([
            fetch(baseCalentamiento + 'schedule_s2.json?v=' + Date.now()).then(r => r.ok ? r.json() : []),
            fetch(baseCalentamiento + 'schedule_s4.json?v=' + Date.now()).then(r => r.ok ? r.json() : []),
            fetch(basePlanes + 'calendario.json?v=' + Date.now()).then(r => r.ok ? r.json() : null)
        ]).then(([s2Data, s4Data, calData]) => {
            
            db.s2 = Array.isArray(s2Data) ? s2Data : [];
            db.s4 = Array.isArray(s4Data) ? s4Data : [];

            if (calData && calData.map && Array.isArray(calData.map)) {
                calData.map.forEach(entry => {
                    let dayNum = parseInt(entry.dia);
                    if (!isNaN(dayNum) && entry.fecha) {
                        if (!db.cal[dayNum]) db.cal[dayNum] = [];
                        db.cal[dayNum].push(entry.fecha);
                    }
                });
            }
            
            renderGrid();
        }).catch(err => {
            document.getElementById('main-grid').innerHTML = `<p style="color:red; padding: 20px;">Error de conexión: ${err.message}</p>`;
        });

        function setCourse(course) {
            currentCourse = course;
            document.querySelectorAll('.btn-course').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + course).classList.add('active');
            renderGrid();
        }

        function formatConstraints(obj) {
            if (!obj) return '';
            return Object.entries(obj).map(([k, v]) => `${k}:${v}`).join(', ');
        }

        function renderGrid() {
            let gridHtml = '';
            let targetSchedule = currentCourse === 's2' ? db.s2 : db.s4;

            for (let day = 1; day <= 80; day++) {
                
                let dayData = targetSchedule.find(d => d.dia === day);
                let isNewDay = false;
                
                if (!dayData) {
                    dayData = { dia: day, topic: '', vocabFile: '', proficiency: 0.8, blocks: [] };
                    isNewDay = true;
                }

                let totalVerbs = (dayData.blocks || []).reduce((sum, b) => sum + (parseInt(b.count) || 0), 0);
                let countClass = totalVerbs === 20 ? 'count-perfect' : 'count-warning';
                let countText = totalVerbs === 0 ? 'Sin verbos' : `${totalVerbs} Verbos`;

                let fechas = db.cal[day] ? db.cal[day].join(' | ') : '';
                let dateHtml = fechas ? `<span class="date-badge">📅 ${fechas}</span>` : '';

                let blocksHtml = '';
                (dayData.blocks || []).forEach((b, bIndex) => {
                    let groupsStr = Array.isArray(b.identityGroups) ? b.identityGroups.join(', ') : '';
                    let constStr = formatConstraints(b.constraints);

                    blocksHtml += `
                        <div class="block-item">
                            <button class="btn-del-block" onclick="deleteBlock(${day}, ${bIndex})">X</button>
                            
                            <div class="block-row">
                                <input type="number" style="width:50px; font-weight:bold; color:#2980b9;" value="${b.count || 0}" title="Cantidad (Count)" onchange="updateBlock(${day}, ${bIndex}, 'count', this.value)">
                                <input type="text" value="${b.label || ''}" placeholder="Etiqueta (ej. Tú afirmativo)" style="font-weight:bold;" onchange="updateBlock(${day}, ${bIndex}, 'label', this.value)">
                            </div>
                            
                            <div class="block-row">
                                <label>Bank JSON:</label>
                                <input type="text" list="common-banks" value="${b.bank || ''}" placeholder="bancos/banco_X.json" onchange="updateBlock(${day}, ${bIndex}, 'bank', this.value)">
                            </div>
                            
                            <div class="block-row">
                                <label>Categoría ID:</label>
                                <input type="text" value="${b.identityCategory || ''}" placeholder="ej. mandatos_informales" onchange="updateBlock(${day}, ${bIndex}, 'identityCategory', this.value)">
                            </div>
                            
                            <div class="block-row">
                                <label>Grupos:</label>
                                <input type="text" value="${groupsStr}" placeholder="ej. regulares_ar, nivel_1" title="Separados por coma" onchange="updateBlock(${day}, ${bIndex}, 'identityGroups', this.value)">
                            </div>
                            
                            <div class="block-row">
                                <label>Filtros (Opt):</label>
                                <input type="text" value="${constStr}" placeholder="ej. persona_base:afirmativo, tipo_verbo:simple" onchange="updateBlock(${day}, ${bIndex}, 'constraints', this.value)">
                            </div>
                        </div>
                    `;
                });

                if (!isNewDay || day <= 45) {
                    gridHtml += `
                        <div class="card">
                            <div class="card-header">
                                <div>Día ${day} <span class="count-badge ${countClass}" style="margin-left:10px;">${countText}</span></div>
                                ${dateHtml}
                            </div>
                            <div class="card-body">
                                
                                <div class="row-group">
                                    <label>Tema / Título:</label>
                                    <input type="text" value="${dayData.topic || ''}" placeholder="Ej. Mandatos Informales (+)" onchange="updateDay(${day}, 'topic', this.value)">
                                </div>
                                <div class="row-group">
                                    <label>Vocab JSON:</label>
                                    <input type="text" value="${dayData.vocabFile || ''}" placeholder="vocab/D2-X-X.json" onchange="updateDay(${day}, 'vocabFile', this.value)">
                                </div>

                                <div class="section-title" style="margin-top:10px;">Bloques de Verbos</div>
                                <div class="block-zone">
                                    ${blocksHtml}
                                    <button class="btn-add-block" onclick="addBlock(${day})">+ Añadir Bloque de Verbos</button>
                                </div>

                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById('main-grid').innerHTML = gridHtml;
        }

        function ensureDayExists(dayNum) {
            let targetSchedule = currentCourse === 's2' ? db.s2 : db.s4;
            let dayObj = targetSchedule.find(d => d.dia === dayNum);
            if (!dayObj) {
                dayObj = { dia: dayNum, topic: "", vocabFile: "", proficiency: 0.8, blocks: [] };
                targetSchedule.push(dayObj);
            }
            return dayObj;
        }

        function updateDay(dayNum, field, value) {
            let dayObj = ensureDayExists(dayNum);
            dayObj[field] = value;
            renderGrid();
        }

        function addBlock(dayNum) {
            let dayObj = ensureDayExists(dayNum);
            if(!dayObj.blocks) dayObj.blocks = [];
            
            dayObj.blocks.push({
                label: "Nuevo Bloque",
                bank: "",
                identityCategory: "",
                identityGroups: [],
                count: 5
            });
            renderGrid();
        }

        function deleteBlock(dayNum, blockIndex) {
            let targetSchedule = currentCourse === 's2' ? db.s2 : db.s4;
            let dayObj = targetSchedule.find(d => d.dia === dayNum);
            if (dayObj && dayObj.blocks) {
                dayObj.blocks.splice(blockIndex, 1);
                renderGrid();
            }
        }

        function updateBlock(dayNum, blockIndex, field, value) {
            let targetSchedule = currentCourse === 's2' ? db.s2 : db.s4;
            let dayObj = targetSchedule.find(d => d.dia === dayNum);
            if (!dayObj || !dayObj.blocks || !dayObj.blocks[blockIndex]) return;

            let block = dayObj.blocks[blockIndex];

            if (field === 'count') {
                block.count = parseInt(value) || 0;
            } else if (field === 'identityGroups') {
                block.identityGroups = value.split(',').map(s => s.trim()).filter(s => s !== '');
            } else if (field === 'constraints') {
                let obj = {};
                let pairs = value.split(',').map(s => s.trim()).filter(s => s !== '');
                pairs.forEach(p => {
                    let parts = p.split(':');
                    if(parts.length === 2) obj[parts[0].trim()] = parts[1].trim();
                });
                
                if (Object.keys(obj).length > 0) {
                    block.constraints = obj;
                } else {
                    delete block.constraints;
                }
            } else {
                block[field] = value;
            }

            renderGrid();
        }

        function exportSchedule() {
            let targetSchedule = currentCourse === 's2' ? db.s2 : db.s4;
            let filename = currentCourse === 's2' ? 'schedule_s2.json' : 'schedule_s4.json';

            let cleanSchedule = [];
            
            targetSchedule.forEach(dayObj => {
                let hasBlocks = dayObj.blocks && dayObj.blocks.length > 0;
                let hasTopic = dayObj.topic && dayObj.topic.trim() !== '';
                let hasVocab = dayObj.vocabFile && dayObj.vocabFile.trim() !== '';
                
                if (hasBlocks || hasTopic || hasVocab) {
                    if (db.cal[dayObj.dia] && db.cal[dayObj.dia].length > 0) {
                        dayObj.date = db.cal[dayObj.dia][0]; 
                    }
                    cleanSchedule.push(dayObj);
                }
            });

            cleanSchedule.sort((a, b) => a.dia - b.dia);

            let jsonString = JSON.stringify(cleanSchedule, null, 2);
            navigator.clipboard.writeText(jsonString).then(() => {
                alert(`¡Éxito!\nEl código para [${filename}] ha sido copiado a tu portapapeles.\n\nPuedes pegarlo en GitHub.`);
            }).catch(err => {
                alert("Hubo un error al copiar.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
