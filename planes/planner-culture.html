<script>
        let db = { videos: null, musica: null, cultura: null, lectura: null, curiosidades: null, destacado: null, cal: {} };
        let currentCourse = 's2'; 

        const baseUrl = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/planes/';

        Promise.all([
            fetch(baseUrl + 'videos.json?v=' + Date.now()).then(r => r.json()),
            fetch(baseUrl + 'musica.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'cultura.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'lectura.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null), // CORREGIDO AQUÍ (lectura.json)
            fetch(baseUrl + 'curiosidades.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'destacadodiario.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'calendario.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null)
        ]).then(([vidData, musData, culData, lecData, curData, desData, calData]) => {
            
            db.videos = vidData || { daily_tags: [] };
            db.musica = musData || { items: {} };
            db.cultura = culData || { items: {} };
            db.lectura = lecData || { items: {} };
            db.curiosidades = Array.isArray(curData) ? curData : (curData && curData.items ? curData.items : []);
            db.destacado = Array.isArray(desData) ? desData : (desData && desData.items ? desData.items : []);

            if (calData && calData.map && Array.isArray(calData.map)) {
                calData.map.forEach(entry => {
                    let dayNum = parseInt(entry.dia);
                    if (!isNaN(dayNum) && entry.fecha) {
                        if (!db.cal[dayNum]) db.cal[dayNum] = [];
                        db.cal[dayNum].push(entry.fecha);
                    }
                });
            }
            
            renderGrid();
        }).catch(err => {
            document.getElementById('main-grid').innerHTML = `<p style="color:red; padding: 20px;">Error al cargar videos.json: ${err.message}</p>`;
        });

        function setCourse(course) {
            currentCourse = course;
            document.querySelectorAll('.btn-course').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + course).classList.add('active');
            renderGrid();
        }

        // Genera el HTML de la zona de contexto
        function getContextHtml(dayNum) {
            let html = '';
            
            Object.entries(db.musica.items || {}).forEach(([key, item]) => {
                if (item.courses && item.courses.includes(currentCourse) && item.dias && item.dias.includes(dayNum)) {
                    html += `
                    <div class="ctx-item ctx-mus">
                        <div class="ctx-content"><strong>🎵 Música:</strong> ${item.titulo} - ${item.subtitulo}</div>
                        <input type="text" class="ctx-input" value="${item.dias.join(', ')}" title="Días (separar con comas)" onchange="updateContextArray('musica', '${key}', this.value)">
                    </div>`;
                }
            });

            Object.entries(db.cultura.items || {}).forEach(([key, item]) => {
                if (item.courses && item.courses.includes(currentCourse) && item.dias && item.dias.includes(dayNum)) {
                    html += `
                    <div class="ctx-item ctx-cul">
                        <div class="ctx-content"><strong>🌎 Cultura:</strong> ${item.titulo}: ${item.subtitulo}</div>
                        <input type="text" class="ctx-input" value="${item.dias.join(', ')}" title="Días (separar con comas)" onchange="updateContextArray('cultura', '${key}', this.value)">
                    </div>`;
                }
            });

            Object.entries(db.lectura.items || {}).forEach(([key, item]) => {
                if (item.courses && item.courses.includes(currentCourse) && item.dias && item.dias.includes(dayNum)) {
                    html += `
                    <div class="ctx-item ctx-lec">
                        <div class="ctx-content"><strong>📕 Lectura:</strong> ${item.titulo}</div>
                        <input type="text" class="ctx-input" value="${item.dias.join(', ')}" title="Días (separar con comas)" onchange="updateContextArray('lectura', '${key}', this.value)">
                    </div>`;
                }
            });

            db.destacado.forEach((item, index) => {
                if (item.dia === dayNum && item.course && item.course.includes(currentCourse)) {
                    let imgHtml = item.image_url ? `<img src="${item.image_url}" class="ctx-img">` : '';
                    let snippet = (item.content && item.content.spanish) ? item.content.spanish : '';
                    html += `
                    <div class="ctx-item ctx-des">
                        ${imgHtml}
                        <div class="ctx-content">
                            <strong>⭐ ${item.header}: ${item.location}</strong><br>
                            <span style="font-size:0.75rem; color:#666;">${snippet}</span>
                        </div>
                        <input type="number" class="ctx-input" value="${item.dia}" title="Día" onchange="updateContextNumber('destacado', ${index}, this.value)">
                    </div>`;
                }
            });

            db.curiosidades.forEach(item => {
                if ((currentCourse === 's2' && item.s2_dia === dayNum) || (currentCourse === 's4' && item.s4_dia === dayNum)) {
                    let imgHtml = item.img ? `<img src="${item.img}" class="ctx-img">` : '';
                    html += `
                    <div class="ctx-item ctx-cur">
                        ${imgHtml}
                        <div class="ctx-content"><strong>🤔 Curiosidad:</strong> ${item.title}</div>
                    </div>`;
                }
            });

            return html !== '' ? html : `<div class="ctx-empty">No hay contexto asignado para hoy.</div>`;
        }

        function updateContextArray(dbName, key, valueStr) {
            let numArr = valueStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            db[dbName].items[key].dias = numArr;
            renderGrid(); 
        }

        function updateContextNumber(dbName, index, valueStr) {
            let num = parseInt(valueStr);
            if(!isNaN(num)) {
                db[dbName][index].dia = num;
                renderGrid(); 
            }
        }

        function renderGrid() {
            if(!db.videos || !db.videos.daily_tags) {
                document.getElementById('main-grid').innerHTML = '<p>Error: videos.json no tiene "daily_tags".</p>';
                return;
            }

            let gridHtml = '';
            
            for (let day = 1; day <= 80; day++) {
                let videosDelDia = db.videos.daily_tags.filter(v => parseInt(v.dia) === day && v.tags && v.tags.includes(currentCourse));
                let contextHtml = getContextHtml(day);
                
                if(contextHtml.includes('ctx-item') || videosDelDia.length > 0 || day <= 40) {
                    
                    let fechas = db.cal[day] ? db.cal[day].join(' | ') : '';
                    let dateHtml = fechas ? `<span class="date-badge">📅 ${fechas}</span>` : '';

                    let vidHtml = '';
                    videosDelDia.forEach(v => {
                        let globalIndex = db.videos.daily_tags.findIndex(x => x === v);
                        let tagsStr = v.tags ? v.tags.join(', ') : '';
                        let isShortCheck = v.is_short ? 'checked' : '';

                        vidHtml += `
                            <div class="video-item">
                                <div class="video-row">
                                    <input type="text" class="vid-id" value="${v.id || ''}" placeholder="ID" onchange="updateVid(${globalIndex}, 'id', this.value)">
                                    <input type="number" class="vid-dia" value="${v.dia}" title="Día" onchange="updateVid(${globalIndex}, 'dia', this.value)">
                                    <input type="text" value="${v.title || ''}" placeholder="Título del Video" style="font-weight:bold;" onchange="updateVid(${globalIndex}, 'title', this.value)">
                                </div>
                                <div class="video-row">
                                    <input type="text" value="${v.video_url || ''}" placeholder="URL del Video (YouTube Embed)" onchange="updateVid(${globalIndex}, 'video_url', this.value)">
                                </div>
                                <div class="video-row">
                                    <input type="text" value="${v.thumbnail_url || ''}" placeholder="URL Miniatura (Opcional)" onchange="updateVid(${globalIndex}, 'thumbnail_url', this.value)">
                                </div>
                                <div class="video-row">
                                    <input type="text" class="vid-tags" value="${tagsStr}" title="Etiquetas (s2, s4, cultura...)" onchange="updateVid(${globalIndex}, 'tags', this.value)">
                                    <label class="checkbox-label">
                                        <input type="checkbox" ${isShortCheck} onchange="updateVid(${globalIndex}, 'is_short', this.checked)"> Es Short
                                    </label>
                                </div>
                                <div class="video-row">
                                    <textarea placeholder="Descripción del video..." onchange="updateVid(${globalIndex}, 'description', this.value)">${v.description || ''}</textarea>
                                </div>
                            </div>
                        `;
                    });

                    gridHtml += `
                        <div class="card">
                            <div class="card-header">
                                <div>Día ${day}</div>
                                ${dateHtml}
                            </div>
                            <div class="card-body">
                                
                                <div class="context-zone">
                                    <div class="section-title" style="margin-bottom:2px; border:none; font-size:0.75rem;">📚 Contexto del Día</div>
                                    ${contextHtml}
                                </div>

                                <div>
                                    <div class="section-title">Videos Asignados</div>
                                    ${vidHtml}
                                    <button class="btn-add-vid" onclick="createNewVideo(${day})">➕ Agregar Video Aquí</button>
                                </div>

                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById('main-grid').innerHTML = gridHtml;
        }

        function createNewVideo(dayNum) {
            db.videos.daily_tags.push({
                id: "nuevo-video",
                dia: dayNum,
                tags: [currentCourse],
                title: "Nuevo Video",
                video_url: "",
                thumbnail_url: "",
                page_url: null,
                is_short: false,
                description: "",
                internal_notes: ""
            });
            renderGrid();
        }

        function updateVid(globalIndex, field, value) {
            if (field === 'dia') value = parseInt(value) || 0;
            if (field === 'tags') value = value.split(',').map(s => s.trim()).filter(s => s !== '');
            
            db.videos.daily_tags[globalIndex][field] = value;
            
            if (field === 'dia' || field === 'tags') {
                renderGrid();
            }
        }

        function exportData(target) {
            let data = null;
            let filename = '';

            if (target === 'videos') { data = db.videos; filename = 'videos.json'; }
            if (target === 'musica') { data = db.musica; filename = 'musica.json'; }
            if (target === 'cultura') { data = db.cultura; filename = 'cultura.json'; }
            if (target === 'lectura') { data = db.lectura; filename = 'lectura.json'; } // CORREGIDO AQUÍ TAMBIÉN
            if (target === 'destacado') { data = db.destacado; filename = 'destacadodiario.json'; }

            if (!data || Object.keys(data).length === 0) {
                alert("Error: No se encontró información para exportar. Verifica que el archivo exista en GitHub.");
                return;
            }

            let jsonString = JSON.stringify(data, null, 2);
            navigator.clipboard.writeText(jsonString).then(() => {
                alert(`¡Éxito!\nEl código para [${filename}] ha sido copiado a tu portapapeles.\n\nPuedes pegarlo en GitHub.`);
            }).catch(err => {
                alert("Hubo un error al copiar.");
                console.error(err);
            });
        }
    </script>
