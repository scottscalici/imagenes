<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Videos y Contexto Diario</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; color: #2c3e50; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        
        .top-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; gap: 10px; }
        .filter-group, .export-group { display: flex; gap: 10px; align-items: center; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: background 0.2s; }
        .btn-course { background: #bdc3c7; color: #2c3e50; }
        .btn-course.active { background: #3498db; color: white; }
        .btn-export { background: #e74c3c; color: white; font-size: 1rem; }
        .btn:hover { filter: brightness(1.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
        
        .card { background: white; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; border-top: 5px solid #e74c3c; }
        .card-header { background: #ecf0f1; padding: 10px 15px; font-weight: bold; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; color: #2c3e50; border-bottom: 1px solid #ddd; }
        .date-badge { font-size: 0.8rem; background: #e8f8f5; color: #16a085; padding: 4px 8px; border-radius: 12px; font-weight: bold; }
        
        .card-body { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .section-title { font-size: 0.85rem; text-transform: uppercase; font-weight: bold; color: #7f8c8d; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        
        /* Badges de Contexto */
        .context-zone { display: flex; flex-direction: column; gap: 5px; background: #fdfdfd; padding: 10px; border-radius: 6px; border: 1px dashed #bdc3c7; }
        .ctx-badge { font-size: 0.85rem; padding: 4px 8px; border-radius: 4px; font-weight: 500; display: inline-block; }
        .ctx-mus { background: #d4e6f1; color: #2980b9; border-left: 3px solid #2980b9; }
        .ctx-cul { background: #d5f5e3; color: #27ae60; border-left: 3px solid #27ae60; }
        .ctx-lec { background: #fdebd0; color: #d35400; border-left: 3px solid #d35400; }
        .ctx-cur { background: #ebdef0; color: #8e44ad; border-left: 3px solid #8e44ad; }
        .ctx-des { background: #fcf3cf; color: #f39c12; border-left: 3px solid #f39c12; }
        .ctx-empty { color: #95a5a6; font-size: 0.8rem; font-style: italic; }

        /* Editor de Videos */
        .video-item { background: #f9ebea; border: 1px solid #fadbd8; border-radius: 6px; padding: 10px; position: relative; display: flex; flex-direction: column; gap: 5px; }
        .video-row { display: flex; gap: 8px; align-items: center; }
        .video-row input[type="text"], .video-row input[type="number"] { padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; width: 100%; box-sizing: border-box; }
        .video-row textarea { padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; width: 100%; resize: vertical; min-height: 40px; font-family: sans-serif; }
        
        .vid-id { width: 80px !important; font-family: monospace; font-weight: bold; color: #c0392b; }
        .vid-dia { width: 60px !important; font-weight: bold; }
        .vid-tags { width: 120px !important; font-family: monospace; }
        
        .checkbox-label { font-size: 0.8rem; font-weight: bold; color: #555; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .btn-add-vid { background: #e74c3c; color: white; width: 100%; text-align: center; margin-top: 5px; border-radius: 4px; padding: 8px; font-weight: bold; cursor: pointer; border: none; }
        .btn-add-vid:hover { background: #c0392b; }
    </style>
</head>
<body>

    <h1>🎬 Planificador de Videos y Contexto Diario</h1>
    
    <div class="top-bar">
        <div class="filter-group">
            <strong>Curso:</strong>
            <button class="btn btn-course active" id="btn-s2" onclick="setCourse('s2')">S2 (Sophomores)</button>
            <button class="btn btn-course" id="btn-s4" onclick="setCourse('s4')">S4 (Seniors)</button>
        </div>
        <div class="export-group">
            <button class="btn btn-export" onclick="exportVideos()">💾 Copiar VIDEOS.JSON Actualizado</button>
        </div>
    </div>

    <div id="main-grid" class="grid">
        <h3 style="text-align:center; width:100%; color:#7f8c8d;">Sincronizando 6 bases de datos desde GitHub...</h3>
    </div>

    <script>
        // Repositorio Maestro
        let db = { videos: null, musica: null, cultura: null, lectura: null, curiosidades: null, destacado: null, cal: {} };
        let currentCourse = 's2'; 

        // URLs base (He asumido que todas están en 'planes/' o carpetas similares. Ajusta estas URLs si las tienes en otro lado)
        const baseUrl = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/planes/';

        Promise.all([
            fetch(baseUrl + 'videos.json?v=' + Date.now()).then(r => r.json()),
            // Los siguientes archivos son de "solo lectura" para el contexto, si fallan (404), no rompen la página.
            fetch(baseUrl + 'musica.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'cultura.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'lecturas.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'curiosidades.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'destacadodiario.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'calendario.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null)
        ]).then(([vidData, musData, culData, lecData, curData, desData, calData]) => {
            
            db.videos = vidData || { daily_tags: [] };
            db.musica = musData || { items: {} };
            db.cultura = culData || { items: {} };
            db.lectura = lecData || { items: {} };
            // Aceptar arrays directos para curiosidades y destacados
            db.curiosidades = Array.isArray(curData) ? curData : (curData && curData.items ? curData.items : []);
            db.destacado = Array.isArray(desData) ? desData : (desData && desData.items ? desData.items : []);

            // Mapeo del calendario
            if (calData && calData.map && Array.isArray(calData.map)) {
                calData.map.forEach(entry => {
                    let dayNum = parseInt(entry.dia);
                    if (!isNaN(dayNum) && entry.fecha) {
                        if (!db.cal[dayNum]) db.cal[dayNum] = [];
                        db.cal[dayNum].push(entry.fecha);
                    }
                });
            }
            
            renderGrid();
        }).catch(err => {
            document.getElementById('main-grid').innerHTML = `<p style="color:red; padding: 20px;">Error crítico al cargar videos.json: ${err.message}</p>`;
        });

        function setCourse(course) {
            currentCourse = course;
            document.querySelectorAll('.btn-course').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + course).classList.add('active');
            renderGrid();
        }

        // Busca el contexto transversal para un día específico
        function getContextHtml(dayNum) {
            let html = '';
            
            // 1. Música (items object)
            Object.values(db.musica.items || {}).forEach(item => {
                if (item.courses && item.courses.includes(currentCourse) && item.dias && item.dias.includes(dayNum)) {
                    html += `<div class="ctx-badge ctx-mus">🎵 ${item.titulo} - ${item.subtitulo}</div>`;
                }
            });

            // 2. Cultura (items object)
            Object.values(db.cultura.items || {}).forEach(item => {
                if (item.courses && item.courses.includes(currentCourse) && item.dias && item.dias.includes(dayNum)) {
                    html += `<div class="ctx-badge ctx-cul">🌎 ${item.titulo}: ${item.subtitulo}</div>`;
                }
            });

            // 3. Lectura (items object)
            Object.values(db.lectura.items || {}).forEach(item => {
                if (item.courses && item.courses.includes(currentCourse) && item.dias && item.dias.includes(dayNum)) {
                    html += `<div class="ctx-badge ctx-lec">📕 Lectura: ${item.titulo}</div>`;
                }
            });

            // 4. Curiosidades (array)
            db.curiosidades.forEach(item => {
                if ((currentCourse === 's2' && item.s2_dia === dayNum) || (currentCourse === 's4' && item.s4_dia === dayNum)) {
                    html += `<div class="ctx-badge ctx-cur">🤔 Curiosidad: ${item.title}</div>`;
                }
            });

            // 5. Destacado Diario (array)
            db.destacado.forEach(item => {
                if (item.dia === dayNum && item.course && item.course.includes(currentCourse)) {
                    html += `<div class="ctx-badge ctx-des">⭐ ${item.header}: ${item.location}</div>`;
                }
            });

            return html !== '' ? html : `<div class="ctx-empty">No hay contexto asignado para hoy.</div>`;
        }

        function renderGrid() {
            if(!db.videos || !db.videos.daily_tags) {
                document.getElementById('main-grid').innerHTML = '<p>Error: La estructura de videos.json no contiene "daily_tags".</p>';
                return;
            }

            let gridHtml = '';
            
            for (let day = 1; day <= 80; day++) {
                // Filtrar videos de este día y que tengan la etiqueta del curso
                let videosDelDia = db.videos.daily_tags.filter(v => parseInt(v.dia) === day && v.tags && v.tags.includes(currentCourse));
                
                // Obtener el contexto HTML de las otras bases de datos
                let contextHtml = getContextHtml(day);
                
                // No mostrar días completamente vacíos (sin contexto Y sin videos), a menos que estemos en los primeros 40 días para dar espacio a crear.
                if(contextHtml.includes('ctx-badge') || videosDelDia.length > 0 || day <= 40) {
                    
                    let fechas = db.cal[day] ? db.cal[day].join(' | ') : '';
                    let dateHtml = fechas ? `<span class="date-badge">📅 ${fechas}</span>` : '';

                    let vidHtml = '';
                    videosDelDia.forEach(v => {
                        let globalIndex = db.videos.daily_tags.findIndex(x => x === v); // Exact object match
                        let tagsStr = v.tags ? v.tags.join(', ') : '';
                        let isShortCheck = v.is_short ? 'checked' : '';

                        vidHtml += `
                            <div class="video-item">
                                <div class="video-row">
                                    <input type="text" class="vid-id" value="${v.id || ''}" placeholder="ID" onchange="updateVid(${globalIndex}, 'id', this.value)">
                                    <input type="number" class="vid-dia" value="${v.dia}" title="Día" onchange="updateVid(${globalIndex}, 'dia', this.value)">
                                    <input type="text" value="${v.title || ''}" placeholder="Título del Video" style="font-weight:bold;" onchange="updateVid(${globalIndex}, 'title', this.value)">
                                </div>
                                <div class="video-row">
                                    <input type="text" value="${v.video_url || ''}" placeholder="URL del Video (YouTube Embed)" onchange="updateVid(${globalIndex}, 'video_url', this.value)">
                                </div>
                                <div class="video-row">
                                    <input type="text" value="${v.thumbnail_url || ''}" placeholder="URL Miniatura (Opcional)" onchange="updateVid(${globalIndex}, 'thumbnail_url', this.value)">
                                </div>
                                <div class="video-row">
                                    <input type="text" class="vid-tags" value="${tagsStr}" title="Etiquetas (s2, s4, cultura...)" onchange="updateVid(${globalIndex}, 'tags', this.value)">
                                    <label class="checkbox-label">
                                        <input type="checkbox" ${isShortCheck} onchange="updateVid(${globalIndex}, 'is_short', this.checked)"> Es Short
                                    </label>
                                </div>
                                <div class="video-row">
                                    <textarea placeholder="Descripción del video..." onchange="updateVid(${globalIndex}, 'description', this.value)">${v.description || ''}</textarea>
                                </div>
                            </div>
                        `;
                    });

                    gridHtml += `
                        <div class="card">
                            <div class="card-header">
                                <div>Día ${day}</div>
                                ${dateHtml}
                            </div>
                            <div class="card-body">
                                
                                <div class="context-zone">
                                    <div class="section-title" style="margin-bottom:2px; border:none; font-size:0.75rem;">📚 Tema del Día (Contexto)</div>
                                    ${contextHtml}
                                </div>

                                <div>
                                    <div class="section-title">Videos Asignados</div>
                                    ${vidHtml}
                                    <button class="btn-add-vid" onclick="createNewVideo(${day})">➕ Agregar Video Aquí</button>
                                </div>

                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById('main-grid').innerHTML = gridHtml;
        }

        // Agregar Video Nuevo
        function createNewVideo(dayNum) {
            db.videos.daily_tags.push({
                id: "nuevo-video",
                dia: dayNum,
                tags: [currentCourse],
                title: "Nuevo Video",
                video_url: "",
                thumbnail_url: "",
                page_url: null,
                is_short: false,
                description: "",
                internal_notes: ""
            });
            renderGrid();
        }

        // Actualizar datos del video
        function updateVid(globalIndex, field, value) {
            if (field === 'dia') value = parseInt(value) || 0;
            if (field === 'tags') {
                value = value.split(',').map(s => s.trim()).filter(s => s !== '');
            }
            db.videos.daily_tags[globalIndex][field] = value;
            
            // Si cambias de día o modificas los tags de curso, refrescar para moverlo de tarjeta
            if (field === 'dia' || field === 'tags') {
                renderGrid();
            }
        }

        // Exportar al portapapeles
        function exportVideos() {
            let jsonString = JSON.stringify(db.videos, null, 2);
            navigator.clipboard.writeText(jsonString).then(() => {
                alert(`¡Éxito!\nEl código para [videos.json] ha sido copiado a tu portapapeles.\n\nPuedes pegarlo en GitHub.`);
            }).catch(err => {
                alert("Hubo un error al copiar.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
