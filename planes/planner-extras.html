<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Extras Diarios</title>
    <style>
        body { font-family: sans-serif; background: #e8eaf6; color: #2c3e50; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        
        .top-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; gap: 15px; }
        
        /* Buscador de Recursos */
        .search-zone { flex-grow: 1; max-width: 500px; position: relative; }
        .search-box { width: 100%; padding: 8px; border: 2px solid #3498db; border-radius: 6px; font-size: 0.95rem; box-sizing: border-box; }
        .search-results { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 0 0 6px 6px; z-index: 100; max-height: 250px; overflow-y: auto; }
        .search-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .search-item:hover { background: #f4f6f7; }
        .btn-copy { background: #2ecc71; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.95rem; transition: background 0.2s; }
        .btn-export { background: #9b59b6; color: white; }
        .btn-add { background: #34495e; color: white; }
        .btn:hover { filter: brightness(1.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        
        .card { background: white; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; border-top: 5px solid #9b59b6; }
        .card-header { background: #ecf0f1; padding: 10px 15px; font-weight: bold; font-size: 1.05rem; display: flex; justify-content: space-between; align-items: center; color: #2c3e50; border-bottom: 1px solid #ddd; }
        .card-body { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .row-group { display: flex; gap: 10px; align-items: center; }
        .row-group input[type="text"], .row-group select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; width: 100%; box-sizing: border-box; }
        .row-group label { font-weight: bold; font-size: 0.8rem; color: #7f8c8d; width: 60px; flex-shrink: 0; }
        
        textarea { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 0.85rem; resize: vertical; min-height: 60px; background: #fdfdfd; }
        
        .date-preview { font-size: 0.75rem; color: #16a085; background: #e8f8f5; padding: 4px; border-radius: 4px; font-weight: bold; line-height: 1.4; margin-top: 2px;}
        
        .dynamic-zone { background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px dashed #bdc3c7; display: flex; flex-direction: column; gap: 8px; }
        
        .link-row { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; }
        .link-row input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>🧩 Planificador de Extras y Actividades</h1>
    
    <div class="top-bar">
        <div class="search-zone">
            <label style="font-size:0.8rem; font-weight:bold; color:#7f8c8d;">🔍 Buscador de Recursos (Para copiar URLs):</label>
            <input type="text" id="rec-search" class="search-box" placeholder="Ej: agua, rosalía, tabú..." onkeyup="searchResources(this.value)">
            <div id="search-results" class="search-results"></div>
        </div>
        
        <div style="display: flex; gap: 10px; align-items: flex-end;">
            <button class="btn btn-add" onclick="createNewExtra()">➕ Nuevo Extra</button>
            <button class="btn btn-export" onclick="exportExtras()">💾 Copiar EXTRAS_DIARIOS.JSON</button>
        </div>
    </div>

    <div id="main-grid" class="grid">
        <h3 style="text-align:center; width:100%; color:#7f8c8d;">Cargando Extras y Recursos desde GitHub...</h3>
    </div>

    <script>
        let db = { extras: null, cal: {}, recursos: [] };
        const baseUrl = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/planes/';

        Promise.all([
            fetch(baseUrl + 'extras_diarios.json?v=' + Date.now()).then(r => r.json()),
            fetch(baseUrl + 'calendario.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            // Fetch for the Search Tool
            fetch(baseUrl + 'conversaciones.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'lecturas.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null)
        ]).then(([extData, calData, convData, lecData]) => {
            
            db.extras = extData || { version: 2, items: [] };

            // Map Calendar
            if (calData && calData.map && Array.isArray(calData.map)) {
                calData.map.forEach(entry => {
                    let dayNum = parseInt(entry.dia);
                    if (!isNaN(dayNum) && entry.fecha) {
                        if (!db.cal[dayNum]) db.cal[dayNum] = [];
                        db.cal[dayNum].push(entry.fecha);
                    }
                });
            }

            // Build Search Pool
            if (convData && convData.items) {
                Object.values(convData.items).forEach(i => {
                    if(i.url) db.recursos.push({ title: i.titulo, type: "Conversación", url: i.url });
                });
            }
            if (lecData && lecData.items) {
                Object.values(lecData.items).forEach(i => {
                    if(i.url) db.recursos.push({ title: i.titulo, type: "Lectura", url: i.url });
                });
            }
            
            renderGrid();
        }).catch(err => {
            document.getElementById('main-grid').innerHTML = `<p style="color:red; padding: 20px;">Error al cargar: ${err.message}</p>`;
        });

        // --- BUSCADOR DE RECURSOS ---
        function searchResources(query) {
            let resDiv = document.getElementById('search-results');
            query = query.toLowerCase().trim();
            
            if (query.length < 2) {
                resDiv.style.display = 'none';
                return;
            }

            let matches = db.recursos.filter(r => r.title.toLowerCase().includes(query)).slice(0, 6);
            
            if (matches.length === 0) {
                resDiv.innerHTML = '<div style="padding:10px; color:#7f8c8d; font-size:0.85rem;">No se encontraron resultados.</div>';
            } else {
                resDiv.innerHTML = matches.map(m => `
                    <div class="search-item">
                        <div>
                            <strong>${m.title}</strong> <span style="font-size:0.7rem; color:#9b59b6;">(${m.type})</span>
                        </div>
                        <button class="btn-copy" onclick="copyToClipboard('${m.url}')">Copiar URL</button>
                    </div>
                `).join('');
            }
            resDiv.style.display = 'block';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                let resDiv = document.getElementById('search-results');
                resDiv.style.display = 'none';
                document.getElementById('rec-search').value = '';
            });
        }

        // Close search if clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-zone')) {
                document.getElementById('search-results').style.display = 'none';
            }
        });

        // --- RENDERIZADO DE EXTRAS ---
        
        function getDatesString(arr) {
            if(!arr || arr.length === 0) return '';
            let dateList = [];
            arr.forEach(d => {
                if(db.cal[d]) dateList.push(`Día ${d}: ${db.cal[d].join(', ')}`);
            });
            return dateList.join(' | ');
        }

        function renderGrid() {
            if(!db.extras || !db.extras.items) return;

            let gridHtml = '';
            
            db.extras.items.forEach((item, index) => {
                
                let s2Str = item.s2_dias ? item.s2_dias.join(', ') : '';
                let s4Str = item.s4_dias ? item.s4_dias.join(', ') : '';
                
                let s2Dates = getDatesString(item.s2_dias);
                let s4Dates = getDatesString(item.s4_dias);

                // HTML Dinámico según el 'kind'
                let dynamicHtml = '';
                if (item.kind === 'sentences') {
                    let inst = item.instructions || '';
                    let sents = (item.sentences || []).join('\n');
                    dynamicHtml = `
                        <label style="font-size:0.8rem; font-weight:bold; color:#555;">Instrucciones:</label>
                        <input type="text" value="${inst}" placeholder="Opcional..." style="width:100%; padding:5px; border:1px solid #ccc; border-radius:4px; font-size:0.85rem;" onchange="updateExtra(${index}, 'instructions', this.value)">
                        
                        <label style="font-size:0.8rem; font-weight:bold; color:#555; margin-top:5px;">Frases/Textos (una por línea):</label>
                        <textarea onchange="updateExtra(${index}, 'sentences', this.value)">${sents}</textarea>
                    `;
                } else if (item.kind === 'links') {
                    let linksHtml = (item.links || []).map((l, i) => {
                        // Soporta el typo anterior "sentences" como url
                        let urlVal = l.url || l.sentences || '';
                        return `
                        <div class="link-row">
                            <input type="text" value="${l.label || ''}" placeholder="Texto del enlace" onchange="updateExtraLink(${index}, ${i}, 'label', this.value)" style="width:35%;">
                            <input type="text" value="${urlVal}" placeholder="URL (Pégalo desde el buscador)" onchange="updateExtraLink(${index}, ${i}, 'url', this.value)" style="width:65%;">
                        </div>`;
                    }).join('');
                    
                    dynamicHtml = `
                        <label style="font-size:0.8rem; font-weight:bold; color:#555;">Enlaces Activos:</label>
                        ${linksHtml}
                        <button class="btn" style="background:#2ecc71; color:white; padding:4px; margin-top:5px; font-size:0.8rem;" onclick="addLinkToExtra(${index})">+ Añadir otro enlace</button>
                    `;
                } else if (item.kind === 'card') {
                    let img = item.img || '';
                    dynamicHtml = `
                        <label style="font-size:0.8rem; font-weight:bold; color:#555;">URL de la Imagen:</label>
                        <input type="text" value="${img}" style="width:100%; padding:5px; border:1px solid #ccc; border-radius:4px; font-size:0.85rem;" onchange="updateExtra(${index}, 'img', this.value)">
                        ${img ? `<img src="${img}" style="max-height:80px; margin-top:8px; border-radius:4px; object-fit:contain; background:#eee; padding:2px;">` : ''}
                    `;
                }

                gridHtml += `
                    <div class="card">
                        <div class="card-header">
                            <input type="text" value="${item.title || ''}" placeholder="Título del Extra" style="font-weight:bold; border:none; background:transparent; font-size:1.05rem; width:100%;" onchange="updateExtra(${index}, 'title', this.value)">
                        </div>
                        <div class="card-body">
                            
                            <div class="row-group">
                                <label>ID:</label>
                                <input type="text" value="${item.id}" style="font-family:monospace; color:#c0392b;" onchange="updateExtra(${index}, 'id', this.value)">
                            </div>
                            
                            <div class="row-group">
                                <label>Tipo:</label>
                                <select onchange="updateExtra(${index}, 'kind', this.value)">
                                    <option value="links" ${item.kind === 'links' ? 'selected' : ''}>🔗 Enlaces (Links)</option>
                                    <option value="sentences" ${item.kind === 'sentences' ? 'selected' : ''}>📝 Textos / Frases</option>
                                    <option value="card" ${item.kind === 'card' ? 'selected' : ''}>🖼️ Tarjeta Visual (Card)</option>
                                </select>
                            </div>

                            <hr style="border:0; border-top:1px solid #eee; margin:5px 0;">

                            <div>
                                <div class="row-group">
                                    <label>S2 Días:</label>
                                    <input type="text" value="${s2Str}" placeholder="Ej: 35, 36, 40" onchange="updateExtraDias(${index}, 's2_dias', this.value)">
                                </div>
                                ${s2Dates ? `<div class="date-preview">S2: ${s2Dates}</div>` : ''}
                            </div>
                            
                            <div>
                                <div class="row-group">
                                    <label>S4 Días:</label>
                                    <input type="text" value="${s4Str}" placeholder="Ej: 49, 50, 51" onchange="updateExtraDias(${index}, 's4_dias', this.value)">
                                </div>
                                ${s4Dates ? `<div class="date-preview">S4: ${s4Dates}</div>` : ''}
                            </div>

                            <div class="dynamic-zone">
                                ${dynamicHtml}
                            </div>

                        </div>
                    </div>
                `;
            });

            document.getElementById('main-grid').innerHTML = gridHtml;
        }

        // --- ACTUALIZADORES DE DATOS ---

        function createNewExtra() {
            db.extras.items.unshift({
                id: "nuevo-extra-" + Math.floor(Math.random()*1000),
                kind: "links",
                title: "Nuevo Elemento",
                links: [],
                s2_dias: [],
                s4_dias: []
            });
            renderGrid();
        }

        function updateExtra(index, field, value) {
            if (field === 'sentences') {
                value = value.split('\n').map(s => s.trim()).filter(s => s !== '');
            }
            
            db.extras.items[index][field] = value;
            
            // Si cambias el 'kind', reseteamos los campos irrelevantes para mantener el JSON limpio y refrescamos
            if (field === 'kind') {
                if(value === 'links') { delete db.extras.items[index].sentences; delete db.extras.items[index].instructions; }
                if(value === 'sentences') { delete db.extras.items[index].links; delete db.extras.items[index].img; }
                if(value === 'card') { delete db.extras.items[index].sentences; delete db.extras.items[index].links; }
                renderGrid();
            }
        }

        function updateExtraDias(index, field, valueStr) {
            let numArr = valueStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            if(numArr.length > 0) {
                db.extras.items[index][field] = numArr;
            } else {
                delete db.extras.items[index][field]; // Si lo borran, lo quitamos del JSON
            }
            renderGrid();
        }

        function updateExtraLink(extraIndex, linkIndex, field, value) {
            if (!db.extras.items[extraIndex].links) db.extras.items[extraIndex].links = [];
            
            // Limpiar typo anterior ("sentences") si están actualizando una URL
            if (field === 'url' && db.extras.items[extraIndex].links[linkIndex].sentences !== undefined) {
                delete db.extras.items[extraIndex].links[linkIndex].sentences;
            }
            
            db.extras.items[extraIndex].links[linkIndex][field] = value;
        }

        function addLinkToExtra(index) {
            if (!db.extras.items[index].links) db.extras.items[index].links = [];
            db.extras.items[index].links.push({ label: "", url: "" });
            renderGrid();
        }

        // --- EXPORTACIÓN ---
        function exportExtras() {
            let jsonString = JSON.stringify(db.extras, null, 2);
            navigator.clipboard.writeText(jsonString).then(() => {
                alert("¡Éxito!\nEl código para [extras_diarios.json] ha sido copiado a tu portapapeles.\n\nPuedes pegarlo en GitHub.");
            }).catch(err => {
                alert("Hubo un error al copiar.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
