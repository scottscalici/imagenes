<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Extras (Vista Diaria)</title>
    <style>
        body { font-family: sans-serif; background: #e8eaf6; color: #2c3e50; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        
        .top-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; gap: 15px; }
        
        /* Buscador de Recursos */
        .search-zone { flex-grow: 1; max-width: 500px; position: relative; }
        .search-box { width: 100%; padding: 8px; border: 2px solid #3498db; border-radius: 6px; font-size: 0.95rem; box-sizing: border-box; }
        .search-results { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 0 0 6px 6px; z-index: 100; max-height: 250px; overflow-y: auto; }
        .search-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .search-item:hover { background: #f4f6f7; }
        .btn-copy { background: #2ecc71; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: background 0.2s; }
        .btn-course { background: #bdc3c7; color: #2c3e50; }
        .btn-course.active { background: #3498db; color: white; }
        .btn-export { background: #9b59b6; color: white; font-size: 1rem;}
        .btn:hover { filter: brightness(1.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        
        .card { background: white; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; border-top: 5px solid #9b59b6; }
        .card-header { background: #ecf0f1; padding: 10px 15px; font-weight: bold; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; color: #2c3e50; border-bottom: 1px solid #ddd; }
        .date-badge { font-size: 0.8rem; background: #e8f8f5; color: #16a085; padding: 4px 8px; border-radius: 12px; font-weight: bold; }
        .card-body { padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        /* Contenedor de un Extra dentro del Día */
        .extra-box { background: #fdfdfd; border: 1px solid #dcdde1; border-radius: 6px; padding: 12px; position: relative; }
        .extra-box.kind-links { border-left: 4px solid #3498db; }
        .extra-box.kind-sentences { border-left: 4px solid #e74c3c; }
        .extra-box.kind-card { border-left: 4px solid #f39c12; }
        
        .extra-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .extra-title-input { font-weight: bold; font-size: 1rem; border: 1px solid transparent; width: 65%; padding: 2px; border-radius: 3px; }
        .extra-title-input:focus { border: 1px solid #ccc; background: white; }
        
        .extra-actions { display: flex; gap: 5px; }
        .btn-icon { background: #ecf0f1; border: none; border-radius: 4px; padding: 4px 6px; cursor: pointer; font-size: 0.8rem; color: #555; }
        .btn-icon:hover { background: #bdc3c7; }
        .btn-icon.del { color: #e74c3c; }
        .btn-icon.del:hover { background: #fadbd8; }

        .row-group { display: flex; gap: 5px; align-items: center; margin-bottom: 5px; }
        .row-group input[type="text"], .row-group select { padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; width: 100%; box-sizing: border-box; }
        .row-group label { font-weight: bold; font-size: 0.75rem; color: #7f8c8d; width: 70px; flex-shrink: 0; }
        
        textarea { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 0.85rem; resize: vertical; min-height: 50px; background: white; margin-top: 5px; }
        
        .link-row { display: flex; gap: 5px; margin-top: 5px; align-items: center; }
        .link-row input { padding: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; }
        
        .active-days-badge { font-size: 0.75rem; color: #27ae60; background: #e9f7ef; padding: 3px 6px; border-radius: 4px; display: inline-block; margin-top: 8px; font-weight: bold;}
        
        /* Zona de Asignación / Creación */
        .assign-zone { border-top: 2px dashed #eee; padding-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    </style>
</head>
<body>

    <h1>🧩 Planificador Diario de Extras</h1>
    
    <div class="top-bar">
        <div style="display:flex; gap:10px; align-items:center;">
            <strong>Curso:</strong>
            <button class="btn btn-course active" id="btn-s2" onclick="setCourse('s2')">S2 (Sophomores)</button>
            <button class="btn btn-course" id="btn-s4" onclick="setCourse('s4')">S4 (Seniors)</button>
        </div>

        <div class="search-zone">
            <input type="text" id="rec-search" class="search-box" placeholder="🔍 Buscar recursos (ej: agua, lectura...) para copiar URL" onkeyup="searchResources(this.value)">
            <div id="search-results" class="search-results"></div>
        </div>
        
        <div>
            <button class="btn btn-export" onclick="exportExtras()">💾 Copiar EXTRAS_DIARIOS.JSON</button>
        </div>
    </div>

    <div id="main-grid" class="grid">
        <h3 style="text-align:center; width:100%; color:#7f8c8d;">Cargando Extras y Recursos desde GitHub...</h3>
    </div>

    <script>
        let db = { extras: null, cal: {}, recursos: [] };
        let currentCourse = 's2';
        const baseUrl = 'https://raw.githubusercontent.com/scottscalici/imagenes/main/planes/';

        Promise.all([
            fetch(baseUrl + 'extras_diarios.json?v=' + Date.now()).then(r => r.json()),
            fetch(baseUrl + 'calendario.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'conversaciones.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null),
            fetch(baseUrl + 'lecturas.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(()=>null)
        ]).then(([extData, calData, convData, lecData]) => {
            
            db.extras = extData || { version: 2, items: [] };

            // Calendario
            if (calData && calData.map && Array.isArray(calData.map)) {
                calData.map.forEach(entry => {
                    let dayNum = parseInt(entry.dia);
                    if (!isNaN(dayNum) && entry.fecha) {
                        if (!db.cal[dayNum]) db.cal[dayNum] = [];
                        db.cal[dayNum].push(entry.fecha);
                    }
                });
            }

            // Pool para el Buscador
            if (convData && convData.items) {
                Object.values(convData.items).forEach(i => {
                    if(i.url) db.recursos.push({ title: i.titulo, type: "Conversación", url: i.url });
                });
            }
            if (lecData && lecData.items) {
                Object.values(lecData.items).forEach(i => {
                    if(i.url) db.recursos.push({ title: i.titulo, type: "Lectura", url: i.url });
                });
            }
            
            renderGrid();
        }).catch(err => {
            document.getElementById('main-grid').innerHTML = `<p style="color:red; padding: 20px;">Error al cargar: ${err.message}</p>`;
        });

        function setCourse(course) {
            currentCourse = course;
            document.querySelectorAll('.btn-course').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + course).classList.add('active');
            renderGrid();
        }

        // --- BUSCADOR DE RECURSOS ---
        function searchResources(query) {
            let resDiv = document.getElementById('search-results');
            query = query.toLowerCase().trim();
            if (query.length < 2) { resDiv.style.display = 'none'; return; }

            let matches = db.recursos.filter(r => r.title.toLowerCase().includes(query)).slice(0, 6);
            if (matches.length === 0) {
                resDiv.innerHTML = '<div style="padding:10px; color:#7f8c8d; font-size:0.85rem;">No se encontraron resultados.</div>';
            } else {
                resDiv.innerHTML = matches.map(m => `
                    <div class="search-item">
                        <div><strong>${m.title}</strong> <span style="font-size:0.7rem; color:#9b59b6;">(${m.type})</span></div>
                        <button class="btn-copy" onclick="copyToClipboard('${m.url}')">Copiar URL</button>
                    </div>
                `).join('');
            }
            resDiv.style.display = 'block';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('search-results').style.display = 'none';
                document.getElementById('rec-search').value = '';
            });
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('.search-zone')) document.getElementById('search-results').style.display = 'none';
        });

        // --- RENDERIZADO VISTA POR DÍA ---
        
        function renderGrid() {
            if(!db.extras || !db.extras.items) return;
            let gridHtml = '';
            let targetArrayName = currentCourse === 's2' ? 's2_dias' : 's4_dias';

            for (let day = 1; day <= 80; day++) {
                
                // Buscar extras que caen en este día para este curso
                let extrasDelDia = db.extras.items.filter(ext => ext[targetArrayName] && ext[targetArrayName].includes(day));
                
                // Mostrar si hay extras, o si estamos en los primeros 45 días
                if (extrasDelDia.length > 0 || day <= 45) {
                    
                    let fechas = db.cal[day] ? db.cal[day].join(' | ') : '';
                    let dateHtml = fechas ? `<span class="date-badge">📅 ${fechas}</span>` : '';

                    let extrasHtml = '';
                    extrasDelDia.forEach(ext => {
                        let globalIndex = db.extras.items.findIndex(x => x === ext);
                        
                        // Generar el HTML Dinámico según el tipo
                        let dynamicHtml = '';
                        if (ext.kind === 'sentences') {
                            let inst = ext.instructions || '';
                            let sents = (ext.sentences || []).join('\n');
                            dynamicHtml = `
                                <div class="row-group" style="margin-top:8px;">
                                    <label>Instrucciones:</label>
                                    <input type="text" value="${inst}" placeholder="Opcional..." onchange="updateExtra(${globalIndex}, 'instructions', this.value)">
                                </div>
                                <textarea placeholder="Frases/Textos (una por línea)..." onchange="updateExtra(${globalIndex}, 'sentences', this.value)">${sents}</textarea>
                            `;
                        } else if (ext.kind === 'links') {
                            let linksHtml = (ext.links || []).map((l, i) => {
                                let urlVal = l.url || l.sentences || ''; // Soporta el error tipográfico previo
                                return `
                                <div class="link-row">
                                    <input type="text" value="${l.label || ''}" placeholder="Texto" onchange="updateExtraLink(${globalIndex}, ${i}, 'label', this.value)" style="width:35%;">
                                    <input type="text" value="${urlVal}" placeholder="URL (Pega aquí)" onchange="updateExtraLink(${globalIndex}, ${i}, 'url', this.value)" style="width:65%;">
                                </div>`;
                            }).join('');
                            dynamicHtml = `
                                <div style="margin-top:8px; font-size:0.8rem; font-weight:bold; color:#555;">Enlaces:</div>
                                ${linksHtml}
                                <button class="btn" style="background:#2ecc71; color:white; padding:4px; margin-top:5px; font-size:0.75rem; width:100%;" onclick="addLinkToExtra(${globalIndex})">+ Añadir enlace</button>
                            `;
                        } else if (ext.kind === 'card') {
                            let img = ext.img || '';
                            dynamicHtml = `
                                <div class="row-group" style="margin-top:8px;">
                                    <label>Imagen URL:</label>
                                    <input type="text" value="${img}" placeholder="Pega URL de imagen..." onchange="updateExtra(${globalIndex}, 'img', this.value)">
                                </div>
                                ${img ? `<img src="${img}" style="max-height:80px; margin-top:5px; border-radius:4px; object-fit:contain; background:#eee; padding:2px;">` : ''}
                            `;
                        }

                        // Etiqueta de días activos
                        let activeDaysStr = ext[targetArrayName].join(', ');
                        
                        extrasHtml += `
                            <div class="extra-box kind-${ext.kind}">
                                <div class="extra-header">
                                    <input type="text" class="extra-title-input" value="${ext.title || ''}" placeholder="Título..." onchange="updateExtra(${globalIndex}, 'title', this.value)">
                                    <div class="extra-actions">
                                        <button class="btn-icon" title="Quitar de este día" onclick="removeExtraFromDay(${globalIndex}, ${day})">❌ Quitar</button>
                                        <button class="btn-icon del" title="Borrar de la base de datos completa" onclick="deleteExtraComplete(${globalIndex})">🗑️ Borrar</button>
                                    </div>
                                </div>
                                
                                <div class="row-group">
                                    <label>ID:</label>
                                    <input type="text" value="${ext.id || ''}" style="font-family:monospace; color:#c0392b;" onchange="updateExtra(${globalIndex}, 'id', this.value)">
                                </div>
                                <div class="row-group">
                                    <label>Tag/Etiqueta:</label>
                                    <input type="text" value="${ext.tag || ''}" placeholder="Ej: Nivel superior..." onchange="updateExtra(${globalIndex}, 'tag', this.value)">
                                </div>
                                <div class="row-group">
                                    <label>Tipo:</label>
                                    <select onchange="updateExtra(${globalIndex}, 'kind', this.value)">
                                        <option value="links" ${ext.kind === 'links' ? 'selected' : ''}>🔗 Enlaces</option>
                                        <option value="sentences" ${ext.kind === 'sentences' ? 'selected' : ''}>📝 Textos</option>
                                        <option value="card" ${ext.kind === 'card' ? 'selected' : ''}>🖼️ Imagen (Card)</option>
                                    </select>
                                </div>
                                
                                ${dynamicHtml}
                                
                                <div class="active-days-badge" title="Cualquier edición aquí actualizará el extra en todos estos días">📍 Activo en días: ${activeDaysStr}</div>
                            </div>
                        `;
                    });

                    // Dropdown para asignar extras existentes
                    let unassignedExtrasHtml = `<option value="">-- Asignar Extra Existente --</option>`;
                    db.extras.items.forEach((ext, i) => {
                        if (!ext[targetArrayName] || !ext[targetArrayName].includes(day)) {
                            unassignedExtrasHtml += `<option value="${i}">${ext.title || ext.id}</option>`;
                        }
                    });

                    gridHtml += `
                        <div class="card">
                            <div class="card-header">
                                <div>Día ${day}</div>
                                ${dateHtml}
                            </div>
                            <div class="card-body">
                                
                                ${extrasHtml}

                                <div class="assign-zone">
                                    <button class="btn" style="background:#34495e; color:white; width:100%; padding:8px;" onclick="createNewExtraInDay(${day})">➕ Crear Nuevo Extra Aquí</button>
                                    
                                    <div style="display:flex; gap:5px; margin-top:5px;">
                                        <select id="assign-ext-${day}" style="flex-grow:1; padding:6px; border:1px solid #ccc; border-radius:4px;">
                                            ${unassignedExtrasHtml}
                                        </select>
                                        <button class="btn" style="background:#f39c12; color:white; padding:6px 10px;" onclick="assignExistingExtra(${day})">➕ Asignar</button>
                                    </div>
                                </div>

                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById('main-grid').innerHTML = gridHtml;
        }

        // --- FUNCIONES MUTADORAS ---

        function createNewExtraInDay(dayNum) {
            let newExt = {
                id: "extra-" + Math.floor(Math.random()*10000),
                kind: "links",
                title: "Nuevo Extra",
                links: [{label: "", url: ""}],
                s2_dias: currentCourse === 's2' ? [dayNum] : [],
                s4_dias: currentCourse === 's4' ? [dayNum] : []
            };
            db.extras.items.unshift(newExt); // Lo añade al principio de la BD
            renderGrid();
        }

        function assignExistingExtra(dayNum) {
            let select = document.getElementById(`assign-ext-${dayNum}`);
            let extIndex = select.value;
            if (extIndex === "") return;
            
            let ext = db.extras.items[extIndex];
            let targetArray = currentCourse === 's2' ? 's2_dias' : 's4_dias';
            
            if (!ext[targetArray]) ext[targetArray] = [];
            ext[targetArray].push(dayNum);
            ext[targetArray].sort((a,b)=>a-b); // Ordenar para que se vea bonito
            
            renderGrid();
        }

        function removeExtraFromDay(extIndex, dayNum) {
            let targetArray = currentCourse === 's2' ? 's2_dias' : 's4_dias';
            db.extras.items[extIndex][targetArray] = db.extras.items[extIndex][targetArray].filter(d => d !== dayNum);
            renderGrid();
        }

        function deleteExtraComplete(extIndex) {
            if(confirm("⚠️ ¿Estás seguro de que quieres borrar este Extra COMPLETAMENTE de todos los días y cursos?")) {
                db.extras.items.splice(extIndex, 1);
                renderGrid();
            }
        }

        function updateExtra(index, field, value) {
            if (field === 'sentences') {
                value = value.split('\n').map(s => s.trim()).filter(s => s !== '');
            }
            db.extras.items[index][field] = value;
            
            // Limpieza al cambiar de tipo
            if (field === 'kind') {
                if(value === 'links') { delete db.extras.items[index].sentences; delete db.extras.items[index].instructions; if(!db.extras.items[index].links) db.extras.items[index].links = []; }
                if(value === 'sentences') { delete db.extras.items[index].links; delete db.extras.items[index].img; }
                if(value === 'card') { delete db.extras.items[index].sentences; delete db.extras.items[index].links; }
                renderGrid();
            }
        }

        function updateExtraLink(extraIndex, linkIndex, field, value) {
            if (!db.extras.items[extraIndex].links) db.extras.items[extraIndex].links = [];
            
            // Limpia el typo antiguo si se está editando una URL nueva
            if (field === 'url' && db.extras.items[extraIndex].links[linkIndex].sentences !== undefined) {
                delete db.extras.items[extraIndex].links[linkIndex].sentences;
            }
            db.extras.items[extraIndex].links[linkIndex][field] = value;
        }

        function addLinkToExtra(index) {
            if (!db.extras.items[index].links) db.extras.items[index].links = [];
            db.extras.items[index].links.push({ label: "", url: "" });
            renderGrid();
        }

        // --- EXPORTACIÓN ---
        function exportExtras() {
            let jsonString = JSON.stringify(db.extras, null, 2);
            navigator.clipboard.writeText(jsonString).then(() => {
                alert("¡Éxito!\nEl código para [extras_diarios.json] ha sido copiado a tu portapapeles.\n\nPuedes pegarlo en GitHub.");
            }).catch(err => {
                alert("Hubo un error al copiar.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
